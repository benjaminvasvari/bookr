<div class="register-container">
  <div class="register-content">
    <div class="register-form-wrapper">
      <h1 class="register-title">REGISZTRÁCIÓ</h1>
      
      <form [formGroup]="registerForm" (ngSubmit)="onSubmit()" class="register-form">
        
        <!-- Vezetéknév -->
        <div class="input-group">
          <input 
            type="text" 
            id="lastName" 
            formControlName="lastName"
            placeholder=" "
            [class.invalid]="submittedFormSnapshot && lastName.invalid">
          <label for="lastName">Vezetéknév</label>
          <i class="fas fa-user input-icon"></i>
        </div>

        <!-- Keresztnév -->
        <div class="input-group">
          <input 
            type="text" 
            id="firstName" 
            formControlName="firstName"
            placeholder=" "
            [class.invalid]="submittedFormSnapshot && firstName.invalid">
          <label for="firstName">Keresztnév</label>
          <i class="fas fa-user input-icon"></i>
        </div>

        <!-- Email cím -->
        <div class="input-group">
          <input 
            type="email" 
            id="email" 
            formControlName="email"
            placeholder=" "
            [class.invalid]="submittedFormSnapshot && email.invalid">
          <label for="email">Email cím</label>
          <i class="fas fa-envelope input-icon"></i>
        </div>

        <!-- Telefonszám -->
        <div class="input-group">
          <input 
            type="tel" 
            id="phone" 
            formControlName="phone"
            placeholder=" "
            [class.invalid]="submittedFormSnapshot && phone.invalid">
          <label for="phone">Telefonszám</label>
          <i class="fas fa-phone input-icon"></i>
        </div>

        <!-- Jelszó -->
        <div class="input-group">
          <input 
            [type]="hidePassword ? 'password' : 'text'"
            id="password" 
            formControlName="password"
            placeholder=" "
            [class.invalid]="submittedFormSnapshot && password.invalid">
          <label for="password">Jelszó</label>
          <i class="fas fa-lock input-icon"></i>
          
          <button 
            type="button" 
            class="toggle-password" 
            (click)="togglePasswordVisibility()"
            [attr.aria-label]="hidePassword ? 'Jelszó megjelenítése' : 'Jelszó elrejtése'">
            <i [class]="hidePassword ? 'fas fa-eye-slash' : 'fas fa-eye'"></i>
          </button>
        </div>

        <!-- Jelszó megerősítése -->
        <div class="input-group">
          <input 
            [type]="hideConfirmPassword ? 'password' : 'text'"
            id="confirmPassword" 
            formControlName="confirmPassword"
            placeholder=" "
            [class.invalid]="submittedFormSnapshot && (confirmPassword.invalid || registerForm.hasError('passwordMismatch'))">
          <label for="confirmPassword">Jelszó megerősítése</label>
          <i class="fas fa-lock input-icon"></i>
          
          <button 
            type="button" 
            class="toggle-password" 
            (click)="toggleConfirmPasswordVisibility()"
            [attr.aria-label]="hideConfirmPassword ? 'Jelszó megjelenítése' : 'Jelszó elrejtése'">
            <i [class]="hideConfirmPassword ? 'fas fa-eye-slash' : 'fas fa-eye'"></i>
          </button>
        </div>

        <!-- KÖZPONTI VALIDÁCIÓS HIBAÜZENET - Az összes mező után -->
        <div *ngIf="validationErrorMessage" class="validation-error-message">
          <i class="fas fa-exclamation-triangle"></i>
          {{ validationErrorMessage }}
        </div>

        <!-- Success message megjelenítése -->
        <div *ngIf="successMessage" class="success-message">
          <i class="fas fa-check-circle"></i>
          {{ successMessage }}
        </div>

        <!-- Backend hibaüzenet megjelenítése -->
        <div *ngIf="errorMessage" class="backend-error-message">
          <i class="fas fa-exclamation-circle"></i>
          {{ errorMessage }}
        </div>

        <!-- Submit gomb -->
        <button 
          type="submit" 
          class="btn-submit"
          [disabled]="isLoading">
          
          <!-- Loading spinner VAGY szöveg -->
          <span *ngIf="!isLoading">FOLYTATÁS</span>
          <span *ngIf="isLoading">
            <i class="fas fa-spinner fa-spin"></i> REGISZTRÁCIÓ...
          </span>
        </button>

        <div class="divider"></div>

        <!-- Login link -->
        <div class="login-section">
          <p class="login-text">Van már fiókod?</p>
          <a routerLink="/login" class="login-link">Jelentkezz be!</a>
        </div>
      </form>
    </div>

    <div class="image-wrapper">
      <div class="image-overlay"></div>
    </div>
  </div>
</div>
