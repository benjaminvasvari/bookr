<aside class="staff-sidebar" [class.is-pinned]="isPinned">
	<div class="sidebar-header">
		<img src="assets/images/logo.png" alt="Bookr" class="brand-icon" />
	</div>

	<button class="pin-btn" type="button" (click)="togglePin()">
		<i class="fas fa-thumbtack pin-icon"></i>
	</button>

	<nav class="sidebar-nav">
		<a routerLink="/" routerLinkActive="active" [routerLinkActiveOptions]="{ exact: true }" class="home-link">
			<i class="fas fa-home"></i>
			<span class="nav-label">Kezdőlap</span>
		</a>
		<a routerLink="/staff/calendar" routerLinkActive="active">
			<i class="fas fa-calendar-alt"></i>
			<span class="nav-label">Naptár</span>
		</a>
	</nav>
</aside>
